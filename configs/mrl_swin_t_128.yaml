experiment_name: mrl_swin_t_128_finetune
output_dir: outputs
seed: 42

data:
  image_size: 128
  batch_size: 128
  eval_batch_size: 256
  num_workers: 8
  pin_memory: true
  datasets:
    - root: /home/featurize/data/data
      class_map:
        sleepy: 0
        awake: 1

model:
  name: swin_tiny_patch4_window7_224
  pretrained: true
  kwargs:
    img_size: 128

train:
  device: cuda
  epochs: 5
  lr: 0.00005
  weight_decay: 0.05
  warmup_epochs: 2
  amp: true
  class_weight: false
