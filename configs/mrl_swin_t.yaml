experiment_name: mrl_swin_t_scratch
output_dir: outputs
seed: 42

data:
  image_size: 224
  batch_size: 128
  eval_batch_size: 256
  num_workers: 8
  pin_memory: true
  datasets:
    # Remote MRL Eye Dataset root.
    # Equivalent local smoke-test path: /Users/ole/Documents/ViTA/dataset/mrl
    # Label mapping: sleepy is equivalent to closed; awake is equivalent to open.
    - root: /home/featurize/data/data
      class_map:
        sleepy: 0
        awake: 1
    # To train open-closed-eyes-dataset instead, replace the dataset above with:
    # - root: /home/featurize/data
    #   class_map:
    #     closed: 0
    #     open: 1

model:
  name: swin_tiny_patch4_window7_224
  pretrained: false

train:
  device: cuda
  epochs: 100
  lr: 0.0005
  weight_decay: 0.05
  warmup_epochs: 5
  amp: true
  class_weight: true
